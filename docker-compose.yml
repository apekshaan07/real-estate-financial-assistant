services:
  postgres:
    image: postgres:16-alpine
    container_name: realestate-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_estate_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql

volumes:
  postgres_data:
